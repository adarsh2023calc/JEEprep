name: Build image when rebuilt

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: alpine:latest
    container:
      image: docker:24.0.5
      options: --privileged 
      
    permissions:
      contents: read
    env:
      IMAGE_NAME: adarshs2023/jeeprep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          registry: docker.io

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Warn about missing Docker credentials
        if: ${{ secrets.DOCKER_USERNAME == '' || secrets.DOCKER_PASSWORD == '' }}
        run: echo "Docker Hub credentials are not configured. The image was built locally only."